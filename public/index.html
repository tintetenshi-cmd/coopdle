<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Coopdle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #app {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .hidden {
            display: none !important;
        }
        
        .title-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .subtitle {
            font-size: 1.1rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        
        .btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        .mode-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 400px;
            width: 90%;
        }
        
        .field-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        
        .mode-buttons {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        
        .mode-buttons .btn {
            flex: 1;
        }
        
        .btn.outline {
            background: transparent;
            border: 2px solid #ff6b6b;
        }
        
        .btn.ghost {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
            padding: 8px 16px;
        }
        
        .field-row {
            display: flex;
            gap: 15px;
        }
        
        .field-half {
            flex: 1;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Écran de titre -->
        <div class="screen screen-title" id="screen-title">
            <div class="title-card">
                <h1>🎮 Coopdle</h1>
                <p class="subtitle">Devinez le même mot à plusieurs, en 6 essais.</p>
                <button id="btn-play" class="btn primary">🚀 Jouer</button>
            </div>
        </div>

        <!-- Écran de sélection du mode -->
        <div class="screen screen-mode hidden" id="screen-mode">
            <div class="mode-card">
                <h2 id="mode-title">🎯 Choix du mode</h2>
                <p id="mode-description">Un mot aléatoire entre 2 et 10 lettres.</p>

                <div class="field-group">
                    <label for="input-pseudo">👤 Pseudo</label>
                    <input id="input-pseudo" type="text" maxlength="16" placeholder="Entrez votre pseudo" />
                </div>

                <div class="field-row">
                    <div class="field-group field-half">
                        <label for="select-avatar">🎭 Icône</label>
                        <select id="select-avatar">
                            <option value="random">🎲 Aléatoire</option>
                        </select>
                    </div>
                    <div class="field-group field-half">
                        <label for="select-name-color">🎨 Couleur</label>
                        <select id="select-name-color">
                            <option value="random">🎲 Aléatoire</option>
                        </select>
                    </div>
                </div>

                <div class="field-group" id="field-length">
                    <label for="select-length">📏 Nombre de lettres</label>
                    <select id="select-length">
                        <option value="0">🎲 Aléatoire (2-10)</option>
                        <option value="2">2 lettres</option>
                        <option value="3">3 lettres</option>
                        <option value="4">4 lettres</option>
                        <option value="5">5 lettres</option>
                        <option value="6">6 lettres</option>
                        <option value="7">7 lettres</option>
                        <option value="8">8 lettres</option>
                        <option value="9">9 lettres</option>
                        <option value="10">10 lettres</option>
                    </select>
                </div>

                <div class="mode-buttons" id="mode-buttons-main">
                    <button id="btn-solo" class="btn primary">🎯 Solo</button>
                    <button id="btn-coop" class="btn outline">👥 Créer Coop</button>
                </div>

                <div class="mode-buttons hidden" id="mode-buttons-join">
                    <button id="btn-join-room" class="btn primary">🚪 Rejoindre</button>
                </div>

                <button id="btn-back-to-title" class="btn ghost">← Retour</button>
            </div>
        </div>

        <!-- Écran de jeu simplifié -->
        <div class="screen screen-game hidden" id="screen-game">
            <div class="mode-card" style="max-width: 600px;">
                <h2>🎮 Jeu en cours...</h2>
                <div style="margin: 20px 0;">
                    <span id="badge-mode" style="background: #ff6b6b; padding: 5px 10px; border-radius: 15px; margin-right: 10px;">Mode</span>
                    <span id="badge-room" style="background: #667eea; padding: 5px 10px; border-radius: 15px;">Room</span>
                </div>
                
                <p>Longueur : <span id="word-length">-</span> lettres • Essais : <span id="attempts">0</span>/<span id="max-attempts">6</span></p>
                
                <div id="board" style="margin: 20px 0; min-height: 100px; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 20px; text-align: center;">
                    Grille de jeu ici
                </div>
                
                <div style="margin: 20px 0;">
                    <input id="input-guess" type="text" placeholder="Tapez votre mot..." style="margin-right: 10px; width: 70%;" />
                    <button id="btn-submit" class="btn" style="width: 25%;">✅ Valider</button>
                </div>
                
                <div id="error" class="hidden" style="color: #ff6b6b; margin: 10px 0;"></div>
                <div id="info" class="hidden" style="color: #4ecdc4; margin: 10px 0;"></div>
                
                <div id="status-current-player" style="margin: 15px 0; font-style: italic;"></div>
                
                <button id="btn-back-to-mode" class="btn ghost">← Retour aux modes</button>
                <button id="btn-new-game" class="btn ghost" style="margin-left: 10px;">🔄 Nouvelle partie</button>
                
                <!-- Éléments cachés mais nécessaires -->
                <div style="display: none;">
                    <div id="share-container" class="hidden">
                        <p id="share-url"></p>
                        <button id="btn-copy-link">Copier</button>
                    </div>
                    <ul id="participants-list"></ul>
                    <div id="chat-messages"></div>
                    <input id="input-chat" />
                    <button id="btn-send-chat">Envoyer</button>
                    <button id="btn-foot-click">🦶</button>
                    <button id="btn-upgrade-click">Upgrade</button>
                    <button id="btn-upgrade-auto">Auto</button>
                    <span id="idle-steps">0</span>
                    <span id="idle-per-click">1</span>
                    <span id="idle-auto-rate">0</span>
                    <span id="cost-click">10</span>
                    <span id="cost-auto">25</span>
                    <span id="cost-letter">500</span>
                    <button id="btn-shop-letter">Lettre</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Éléments cachés mais nécessaires -->
    <div style="display: none;">
        <div id="monkey-container" class="hidden">
            <div id="monkey-bubble"></div>
        </div>
    </div>

    <script src="main-simple.js"></script>
</body>
</html>
